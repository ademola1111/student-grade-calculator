
<!DOCTYPE html>
<html>
    <head>
        <title>Student Grade Calculator</title>
        <link rel="stylesheet" href="portfolio.css">
    </head>
    <body>
    <div class="card">
        <h2>Student Grade Calculator</h2>

        <label for="studentName">Student Name:</label>
        <input type="text" id="studentName" placeholder="enter your name"><br><br>
        
        <label for="studentScore">Student Score:</label>
        <input type="text" id="studentScore" placeholder="enter your score(1-100)"><br>

        <button onclick="calculateGrade()">Calculate</button>
    

    <div id="resultBox">
    <p id="outName">Name:</p>
    <p id="outScore">Score:</p>
    <p id="outGrade">Grade:</p>
    <p id="outRemark">Remark:</p>
    </div>
    </div>
    <script src="portfolio.js"></script>
    </body>
</html>
